<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>SameGame examples</title>
        <style>
            body {
                font-family: system-ui;
                display: flex;
                justify-content: center;
            }
            main {
                width: 700px;
                text-align: center;
            }
            .buttons {
                margin-bottom: 20px;
            }
            button {
                margin: 6px;
                padding: 6px 12px;
            }
            #description {
                font-size: 14px;
                line-height: 1.4;
            }
            #board {
                display: inline-block;
                margin: 20px auto;
            }
            .row {
                display: flex;
                justify-content: center;
            }
            .cell {
                width: 32px;
                height: 32px;
                border: 1px solid #ccc;
            }
            .cell.highlight {
                box-shadow: inset 0 0 0 2px rgba(0,0,0,0.6), inset 0 0 10px rgba(0,0,0,0.35);
            }
            #controls {
                margin-top: 10px;
            }
            #log {
                margin-top: 20px;
                text-align: left;
            }
            button {
                margin: 6px;
                padding: 6px 12px;
                cursor: pointer;
            }
            button.active {
                background: #2c3e50;
                color: white;
            }
        </style>
      <script type="module" crossorigin src="/samegame-engine/assets/demo-EdsAulhL.js"></script>
    </head>
    <body>
        <main>
            <h1>SameGame Examples</h1>
            <div class="buttons">
                <button class="example" data-example="basic">Basic</button>
                <button class="example" data-example="complexTiles">Complex tiles</button>
                <button class="example" data-example="region">Region</button>
                <button class="example" data-example="remove">Remove</button>
                <button class="example" data-example="gravity">Gravity</button>
                <button class="example" data-example="rotate">Rotate</button>
                <button class="example" data-example="endless">Endless</button>
            </div>
            <div id="description"></div>
            <div id="board"></div>
            <div id="controls">
                <button class="gravity" data-gravity="up">Up</button>
                <button class="gravity" data-gravity="right">Right</button>
                <button class="gravity active" data-gravity="down">Down</button>
                <button class="gravity" data-gravity="left">Left</button>
            </div>
            <div id="rotation">
                <button class="rotate" data-rotation="clockwise">Rotate Clockwise</button>
                <button class="rotate" data-rotation="counter-clockwise">Rotate Counter-Clockwise</button>
            </div>
            <div id="log"></div>
        </main>
    </body>
</html>
